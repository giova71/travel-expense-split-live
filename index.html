<!DOCTYPE html>
<html lang="it">
<head>
  <base target="_top">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Travel expense split live</title>
  <meta name="theme-color" content="#01696f" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #edeae5; --color-border: #d4d1ca;
      --color-text: #28251d; --color-text-muted: #6f6d67; --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-success: #437a22; --color-success-highlight: #d4dfcc; --color-warning: #964219; --color-warning-highlight: #ddcfc6; --color-error: #a12c7b; --color-error-highlight: #e0ced7;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px; --shadow-sm: 0 1px 2px rgba(40,37,29,.06); --shadow-md: 0 8px 24px rgba(40,37,29,.08);
      --font-body: 'Satoshi', Inter, sans-serif; --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #22211f; --color-border: #393836;
      --color-text: #cdccca; --color-text-muted: #a5a39f; --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-success: #6daa45; --color-success-highlight: #3a4435; --color-warning: #bb653b; --color-warning-highlight: #564942; --color-error: #d163a7; --color-error-highlight: #4c3d46;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.2); --shadow-md: 0 12px 32px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100dvh; font: var(--text-base)/1.5 var(--font-body); background:var(--color-bg); color:var(--color-text); }
    input, select, textarea, button { font: inherit; color: inherit; }
    .app { max-width: 1120px; margin: 0 auto; padding: max(var(--space-4), env(safe-area-inset-top)) var(--space-4) calc(var(--space-8) + env(safe-area-inset-bottom)); }
    .topbar, .actions, .toolbar, .split-toggle, .expense-meta { display:flex; gap: var(--space-2); flex-wrap: wrap; }
    .topbar { justify-content:space-between; align-items:center; margin-bottom: var(--space-6); }
    .brand { display:flex; align-items:center; gap: var(--space-3); }
    .logo { width:42px; height:42px; border-radius: var(--radius-md); background: var(--color-primary-highlight); color: var(--color-primary); padding:8px; }
    .brand h1 { margin:0; font-size: var(--text-xl); line-height:1.05; }
    .brand p, .helper, .muted { color: var(--color-text-muted); }
    .theme-toggle, .icon-btn { min-width:44px; min-height:44px; border-radius: var(--radius-full); border:1px solid var(--color-border); background: var(--color-surface); }
    .layout, .stats, .summary-grid, .field-grid { display:grid; gap: var(--space-4); }
    .layout { grid-template-columns: 1fr 1fr; }
    .stats { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .summary-grid, .field-grid { grid-template-columns: 1fr 1fr; }
    .card { background: var(--color-surface); border:1px solid rgba(122,121,116,.18); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); }
    .card-inner { padding: var(--space-5); }
    .section-title { margin:0 0 var(--space-4); font-size: var(--text-lg); }
    .stat, .summary-box { padding: var(--space-4); border-radius: var(--radius-lg); background: var(--color-surface-2); }
    .stat small, .summary-box small { display:block; color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing:.04em; }
    .stat strong, .summary-box strong { display:block; margin-top: var(--space-1); font-size: var(--text-lg); }
    .field { display:grid; gap: var(--space-2); margin-bottom: var(--space-3); }
    label { font-size: var(--text-sm); font-weight:700; }
    input, select, textarea { width:100%; min-height:46px; border-radius: var(--radius-md); border:1px solid var(--color-border); background: var(--color-surface-2); padding: 0 var(--space-3); }
    textarea { min-height: 124px; padding: var(--space-3); resize: vertical; }
    .btn, .chip { min-height:44px; padding: 0 var(--space-4); border-radius: var(--radius-full); border:1px solid transparent; font-size: var(--text-sm); font-weight:700; transition: all var(--transition); }
    .btn-primary { background: var(--color-primary); color:#f9f8f4; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-surface-2); border-color: var(--color-border); }
    .chip { background: var(--color-surface-2); border-color: var(--color-border); color: var(--color-text-muted); }
    .chip.active { background: var(--color-primary-highlight); color: var(--color-primary); border-color: transparent; }
    .alert { margin-top: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-lg); display:none; font-size: var(--text-sm); }
    .alert.show { display:block; }
    .info { background: var(--color-primary-highlight); color: var(--color-primary); }
    .error { background: var(--color-error-highlight); color: var(--color-error); }
    .ok { background: var(--color-success-highlight); color: var(--color-success); }
    .warning { background: var(--color-warning-highlight); color: var(--color-warning); }
    .list { display:grid; gap: var(--space-3); }
    .expense-item { display:grid; grid-template-columns: 1fr auto; gap: var(--space-3); padding: var(--space-4); border-radius: var(--radius-lg); background: var(--color-surface-2); border:1px solid rgba(122,121,116,.15); }
    .tag { padding:.25rem .55rem; border-radius: var(--radius-full); background: var(--color-surface-offset); font-size: var(--text-xs); }
    .empty { padding: var(--space-8) var(--space-4); text-align:center; color: var(--color-text-muted); border:1px dashed var(--color-border); border-radius: var(--radius-lg); background: var(--color-surface-2); }
    .settlement { margin-top: var(--space-4); padding: var(--space-4); border-radius: var(--radius-lg); font-weight:700; }
    @media (max-width: 900px) {
      .layout, .stats, .summary-grid, .field-grid { grid-template-columns: 1fr; }
      .topbar { align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" fill="none" aria-label="Logo" role="img">
          <rect x="8" y="8" width="48" height="48" rx="14" stroke="currentColor" stroke-width="4"></rect>
          <path d="M18 33h10l4-10 5 18 4-8h5" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <div>
          <h1>Track Spese live</h1>
          <p class="muted">Spese condivise con Google Sheets e Apps Script.</p>
          <p class="muted">Deploy corrente: <span id="deployVersionLabel"></span></p>
        </div>
      </div>
      <div class="toolbar">
        <button class="theme-toggle" data-theme-toggle aria-label="Cambia tema">🌓</button>
        <button class="btn btn-secondary" id="healthBtn" type="button">Health check</button>
      </div>
    </header>

    <main>
      <section class="layout">
        <article class="card">
          <div class="card-inner">
            <h2 class="section-title">Connessione</h2>
            <div class="field-grid">
              <div class="field">
                <label for="tripId">ID Spese</label>
                <input id="tripId" type="text" placeholder="es. sardegna-2026" />
              </div>
              <div class="field">
                <label for="myName">Utente</label>
                <select id="myName">
                  <option value="Giovanni">Giovanni</option>
                  <option value="Viviana">Viviana</option>
                </select>
              </div>
            </div>
            <div class="actions">
              <button id="connectBtn" class="btn btn-primary" type="button">Carica Spese</button>
              <button id="disconnectBtn" class="btn btn-secondary" type="button">Svuota vista</button>
            </div>
            <div id="connectionAlert" class="alert show warning">Inserisci un ID Spese e premi Carica Spese.</div>
          </div>
        </article>

        <article class="card">
          <div class="card-inner">
            <h2 class="section-title">Nuova spesa</h2>
            <form id="expenseForm">
              <!-- stesso markup precedente -->
            </form>
          </div>
        </article>
      </section>
    </main>

    <script>
      const DEPLOY_VERSION = '<?= deployVersion ?>';
      const INITIAL_TRIP_ID = '<?= initialTripId ?>';
      document.getElementById('deployVersionLabel').textContent = DEPLOY_VERSION;

      function googleRun(fn, ...args) {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[fn](...args);
        });
      }

      async function loadTrip(tripId) {
        const res = await googleRun('listExpenses', tripId);
        return res;
      }

      document.getElementById('healthBtn').addEventListener('click', async () => {
        const res = await googleRun('getAppState');
        alert(JSON.stringify(res, null, 2));
      });

      // qui puoi incollare la stessa logica UI già pronta,
      // sostituendo api('list'/'add'/'delete') con googleRun('listExpenses'/'addExpense'/'deleteExpense')
      // e aggiornando render(), currentShares(), buildReport() come prima.

      if (INITIAL_TRIP_ID) {
        document.getElementById('tripId').value = INITIAL_TRIP_ID;
      }
    </script>
  </div>
</body>
</html>
